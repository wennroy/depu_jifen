services:
  app:
    build:
      context: .
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    container_name: depu-jifen
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8085:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/poker.db
      - BACKEND_PORT=8000
