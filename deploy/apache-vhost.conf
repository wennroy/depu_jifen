# Apache reverse proxy config for depu-jifen (Docker)
# Enable modules: mod_proxy mod_proxy_http mod_proxy_wstunnel mod_rewrite
#
# a2enmod proxy proxy_http proxy_wstunnel rewrite

<VirtualHost *:80>
    ServerName poker.example.com

    ProxyPreserveHost On

    # WebSocket
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*) ws://127.0.0.1:${EXPOSE_PORT}/ws/$1 [P,L]

    # All traffic to Docker container
    ProxyPass / http://127.0.0.1:${EXPOSE_PORT}/
    ProxyPassReverse / http://127.0.0.1:${EXPOSE_PORT}/
</VirtualHost>
