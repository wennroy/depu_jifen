# Apache reverse proxy config for depu-jifen (Docker)
#
# 前置条件:
#   a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
#
# 用法:
#   1. 复制到 /etc/apache2/sites-available/depu-jifen.conf
#   2. 将 poker.example.com 替换为你的实际域名
#   3. a2ensite depu-jifen && systemctl reload apache2
#   4. 用 certbot 申请 SSL 证书 (会自动修改此文件)

<VirtualHost *:80>
    ServerName poker.example.com

    # HTTP → HTTPS 重定向
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName poker.example.com

    # --- SSL (certbot 会自动填充以下内容) ---
    SSLEngine on
    # SSLCertificateFile    /etc/letsencrypt/live/poker.example.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/poker.example.com/privkey.pem

    # --- 安全头 ---
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    ProxyPreserveHost On

    # --- WebSocket 代理 ---
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*) ws://127.0.0.1:8085/ws/$1 [P,L]

    # --- HTTP 反向代理 ---
    ProxyPass / http://127.0.0.1:8085/
    ProxyPassReverse / http://127.0.0.1:8085/

    # --- 日志 ---
    ErrorLog ${APACHE_LOG_DIR}/depu-jifen-error.log
    CustomLog ${APACHE_LOG_DIR}/depu-jifen-access.log combined
</VirtualHost>
